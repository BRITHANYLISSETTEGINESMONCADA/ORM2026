{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title">{{ title }}</h1>
        <p>{{ question }}</p>
        <form method="POST">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Eliminar</button>
            <a class="btn btn-secondary" href="{{ cancel_url }}">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
