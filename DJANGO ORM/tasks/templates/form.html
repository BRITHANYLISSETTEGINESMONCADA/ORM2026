{% extends 'base.html' %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <h1 class="card-title mb-3">{{ title }}</h1>
        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">{{ submit_label|default:"Guardar" }}</button>
            <a class="btn btn-secondary" href="{{ cancel_url }}">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
