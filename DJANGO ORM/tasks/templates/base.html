{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django CRUD Auth</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{% static 'tasks/styles.css' %}" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark app-navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="{% url 'home' %}">django_crud_auth</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNavbar">
            <div class="navbar-nav ms-auto">
                {% if user.is_authenticated %}
                    <a class="nav-link" href="{% url 'home' %}">Inicio</a>
                    <a class="nav-link" href="{% url 'tasks' %}">Tareas</a>
                    <a class="nav-link" href="{% url 'cargo_list' %}">Cargos</a>
                    <a class="nav-link" href="{% url 'empleado_list' %}">Empleados</a>
                    <a class="nav-link" href="{% url 'signout' %}">Cerrar sesión</a>
                {% else %}
                    <a class="nav-link" href="{% url 'signin' %}">Iniciar sesión</a>
                    <a class="nav-link" href="{% url 'signup' %}">Registrarse</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="app-shell">
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
